# Fragment nginx: HTTP → HTTPS (apex + www) oraz zalecany nagłówek przy proxy do Next.
# nginx -t && systemctl reload nginx  (lub odpowiednik)

# --- Port 80: tylko przekierowanie na HTTPS (kanoniczny host bez www) ---
server {
    listen 80;
    listen [::]:80;
    server_name estateos.pl;
    return 301 https://estateos.pl$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.estateos.pl;
    return 301 https://estateos.pl$request_uri;
}

